# Apache reverse proxy for Next.js — IP-only (no domain) deployment.
# Used by install.sh when SKIP_CADDY=1 and Apache is available.
# Placeholders are replaced by install.sh at deploy time.

<VirtualHost *:80>
    ServerName {{SERVER_NAME}}

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Reverse proxy to Next.js
    ProxyPreserveHost On
    ProxyPass /ws ws://{{NEXT_HOST}}:{{NEXT_PORT}}/ws
    ProxyPassReverse /ws ws://{{NEXT_HOST}}:{{NEXT_PORT}}/ws
    ProxyPass / http://{{NEXT_HOST}}:{{NEXT_PORT}}/
    ProxyPassReverse / http://{{NEXT_HOST}}:{{NEXT_PORT}}/

    # WebSocket upgrade support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ws(.*)$ ws://{{NEXT_HOST}}:{{NEXT_PORT}}/ws$1 [P,L]

    # Optional AList reverse proxy
    # ProxyPass /files-proxy http://127.0.0.1:5244/files-proxy
    # ProxyPassReverse /files-proxy http://127.0.0.1:5244/files-proxy

    # Optional Emby reverse proxy
    # ProxyPass /emby http://127.0.0.1:8096/emby
    # ProxyPassReverse /emby http://127.0.0.1:8096/emby

    ErrorLog ${APACHE_LOG_DIR}/next-error.log
    CustomLog ${APACHE_LOG_DIR}/next-access.log combined
</VirtualHost>
