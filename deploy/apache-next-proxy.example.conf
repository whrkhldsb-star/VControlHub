# Apache reverse proxy for Next.js — IP-only (no domain) deployment.
# Used by install.sh when SKIP_CADDY=1 and Apache is available.
# Placeholders are replaced by install.sh at deploy time.

<VirtualHost *:80>
 ServerName {{SERVER_NAME}}

 # Security headers
 Header always set X-Content-Type-Options "nosniff"
 Header always set X-Frame-Options "SAMEORIGIN"
 Header always set X-XSS-Protection "1; mode=block"
 Header always set Referrer-Policy "strict-origin-when-cross-origin"

 # Reverse proxy to Next.js (HTTP)
 ProxyPreserveHost On
 ProxyPass / http://{{NEXT_HOST}}:{{NEXT_PORT}}/
 ProxyPassReverse / http://{{NEXT_HOST}}:{{NEXT_PORT}}/

 # WebSocket: /ws → Next.js notification WS (port 3000)
 ProxyPass /ws ws://{{NEXT_HOST}}:{{NEXT_PORT}}/ws
 ProxyPassReverse /ws ws://{{NEXT_HOST}}:{{NEXT_PORT}}/ws

 # WebSocket: /ssh → SSH-WS proxy (port 3001)
 ProxyPass /ssh ws://{{SSH_WS_HOST}}:{{SSH_WS_PORT}}/ssh
 ProxyPassReverse /ssh ws://{{SSH_WS_HOST}}:{{SSH_WS_PORT}}/ssh

 # Fallback WebSocket upgrade support
 RewriteEngine On
 RewriteCond %{HTTP:Upgrade} websocket [NC]
 RewriteCond %{HTTP:Connection} upgrade [NC]
 RewriteRule ^/ws(.*)$ ws://{{NEXT_HOST}}:{{NEXT_PORT}}/ws$1 [P,L]
 RewriteRule ^/ssh(.*)$ ws://{{SSH_WS_HOST}}:{{SSH_WS_PORT}}/ssh$1 [P,L]

 ErrorLog ${APACHE_LOG_DIR}/next-error.log
 CustomLog ${APACHE_LOG_DIR}/next-access.log combined
</VirtualHost>
