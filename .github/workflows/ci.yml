name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/whrkhldsb_ci
      NODE_ENV: test
      NEXT_TELEMETRY_DISABLED: 1
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: whrkhldsb_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d whrkhldsb_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Fail fast with a clear message if someone adds a Prisma mock that
      # returns Promise instead of PrismaPromise — this was the long-running
      # red CI cause (move-file-action.test.ts). Keep typecheck above tests.
      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      - name: Build
        run: npm run build

      - name: Build runtime bundle
        run: npm run build:runtime

  e2e-public-cross-browser:
    name: E2E public smoke (Chromium + Firefox + WebKit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    env:
      NEXT_TELEMETRY_DISABLED: 1
      PLAYWRIGHT_CROSS_BROWSER: "1"
      PLAYWRIGHT_SKIP_WEB_SERVER: "1"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      # Do NOT set NODE_ENV=production at job scope: npm ci would omit
      # devDependencies (@tailwindcss/postcss) and next build fails.
      NEXT_HOST: 127.0.0.1
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/whrkhldsb_ci
      AUTH_SECRET: ci-e2e-auth-secret-at-least-32-bytes-long
      AUTH_SESSION_SECRET: ci-e2e-session-secret-at-least-32-bytes
      ADMIN_INITIAL_PASSWORD: ci-e2e-admin-initial-password
      APP_SLUG: vcontrolhub
      AUTH_SESSION_COOKIE_NAME: vcontrolhub_session
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: whrkhldsb_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d whrkhldsb_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-${{ hashFiles('next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-next-

      - name: Apply database schema
        run: npx prisma db push --accept-data-loss

      - name: Seed admin roles (for authenticated smoke)
        run: npx tsx prisma/seed.ts

      # Build in this job (same runner as the server) so .next is never
      # transferred across jobs. Local rebuild + .next/cache is cheaper and
      # more reliable than cross-job .next artifacts (see docs/ci-gates.md).
      - name: Build app + runtime
        run: |
          npm run build
          npm run build:runtime

      - name: Start production custom server
        env:
          NODE_ENV: production
        run: |
          set -euo pipefail
          nohup node dist/server.js > /tmp/vch-e2e-server.log 2>&1 &
          echo $! > /tmp/vch-e2e-server.pid
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:3000/login >/dev/null 2>&1; then
              echo "server ready (pid=$(cat /tmp/vch-e2e-server.pid))"
              # Keep the step alive only long enough to confirm readiness.
              # Server continues via nohup for subsequent steps.
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/vch-e2e-server.pid)" 2>/dev/null; then
              echo "server process exited early"
              cat /tmp/vch-e2e-server.log || true
              exit 1
            fi
            sleep 2
          done
          echo "server failed to become ready"
          cat /tmp/vch-e2e-server.log || true
          exit 1

      - name: Run public smoke across browsers
        env:
          NODE_ENV: production
        run: |
          set -euo pipefail
          # Confirm server still up before Playwright starts.
          curl -fsS http://127.0.0.1:3000/login >/dev/null
          npx playwright test e2e/public-smoke.spec.ts \
            --project=chromium --project=firefox --project=webkit \
            --workers=1 --retries=1

      # Authenticated golden path on Chromium only (keeps the job short).
      # Uses isolated admin + direct session minting so seed PENDING_PASSWORD_RESET
      # does not block navigation. Full multi-browser authenticated suite stays nightly.
      - name: Run authenticated smoke (Chromium)
        env:
          NODE_ENV: production
          E2E_DIRECT_SESSION: "1"
          E2E_TRUST_LOCAL_DB_SESSION: "1"
          E2E_ISOLATED_ACCOUNT: "1"
          E2E_USER: vcontrolhub_e2e
          E2E_PASS: VControlHub-E2E-2026!
          E2E_DIRECT_USER: vcontrolhub_e2e
        run: |
          set -euo pipefail
          curl -fsS http://127.0.0.1:3000/login >/dev/null
          npx playwright test e2e/authenticated-flow.spec.ts \
            --project=chromium --workers=1 --retries=1

      - name: Dump server log on failure
        if: failure()
        run: |
          echo "--- server pid ---"
          cat /tmp/vch-e2e-server.pid || true
          echo "--- server log ---"
          cat /tmp/vch-e2e-server.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-public-cross-browser
          path: |
            .playwright-output/
            playwright-report/
            /tmp/vch-e2e-server.log
          if-no-files-found: ignore

  dast-baseline:
    name: DAST baseline (optional surface probe)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      NEXT_TELEMETRY_DISABLED: 1
      BASE_URL: http://127.0.0.1:3000
      # NODE_ENV only on server start — npm ci must install devDependencies.
      NEXT_HOST: 127.0.0.1
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/whrkhldsb_ci
      AUTH_SECRET: ci-dast-auth-secret-at-least-32-bytes-long
      AUTH_SESSION_SECRET: ci-dast-session-secret-at-least-32-bytes
      ADMIN_INITIAL_PASSWORD: ci-dast-admin-initial-password
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: whrkhldsb_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d whrkhldsb_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-${{ hashFiles('next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-next-

      - name: Apply database schema
        run: npx prisma db push --accept-data-loss

      - name: Build app + runtime
        run: |
          npm run build
          npm run build:runtime

      - name: Start production custom server
        env:
          NODE_ENV: production
        run: |
          set -euo pipefail
          nohup node dist/server.js > /tmp/vch-dast-server.log 2>&1 &
          echo $! > /tmp/vch-dast-server.pid
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:3000/login >/dev/null 2>&1; then
              echo "server ready (pid=$(cat /tmp/vch-dast-server.pid))"
              exit 0
            fi
            if ! kill -0 "$(cat /tmp/vch-dast-server.pid)" 2>/dev/null; then
              echo "server process exited early"
              cat /tmp/vch-dast-server.log || true
              exit 1
            fi
            sleep 2
          done
          echo "server failed to become ready"
          cat /tmp/vch-dast-server.log || true
          exit 1

      - name: Run DAST baseline probe
        env:
          NODE_ENV: production
        run: |
          set -euo pipefail
          curl -fsS http://127.0.0.1:3000/login >/dev/null
          npm run dast:baseline

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/vch-dast-server.log || true

      - name: Upload DAST output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-baseline
          path: |
            .dast-output/
            /tmp/vch-dast-server.log
          if-no-files-found: ignore
